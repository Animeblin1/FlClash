name: Build FlClash

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      mihomo_channel:
        description: 'Mihomo core channel'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - alpha
          - custom
      mihomo_version:
        description: 'Mihomo version (e.g. v1.19.25, only for custom channel)'
        required: false
        default: ''
      build_platforms:
        description: 'Platforms to build'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - all
      create_release:
        description: 'Create GitHub Release'
        required: true
        default: true
        type: boolean

env:
  GO_VERSION: '1.23'
  FLUTTER_VERSION: '3.27.4'
  JAVA_VERSION: '17'
  NDK_VERSION: '27.2.12479018'
  ANDROID_API: '35'

jobs:
  resolve-mihomo:
    name: Resolve Mihomo Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve version
        id: resolve
        run: |
          CHANNEL="${{ github.event.inputs.mihomo_channel || 'stable' }}"
          CUSTOM_VER="${{ github.event.inputs.mihomo_version }}"

          if [ "$CHANNEL" = "custom" ] && [ -n "$CUSTOM_VER" ]; then
            TAG="$CUSTOM_VER"
          elif [ "$CHANNEL" = "alpha" ]; then
            TAG=$(curl -s "https://api.github.com/repos/metacubex/mihomo/releases" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              | jq -r '[.[] | select(.prerelease == true)] | first | .tag_name')
            if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
              echo "No alpha release found, falling back to stable"
              TAG=$(curl -s "https://api.github.com/repos/metacubex/mihomo/releases/latest" \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                | jq -r '.tag_name')
            fi
          else
            TAG=$(curl -s "https://api.github.com/repos/metacubex/mihomo/releases/latest" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              | jq -r '.tag_name')
          fi

          VERSION="${TAG#v}"
          echo "Resolved mihomo: tag=$TAG version=$VERSION channel=$CHANNEL"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: resolve-mihomo
    if: |
      github.event.inputs.build_platforms == 'android' ||
      github.event.inputs.build_platforms == 'all' ||
      github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: core/go.sum

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;${{ env.NDK_VERSION }}"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Update Mihomo core to ${{ needs.resolve-mihomo.outputs.tag }}
        working-directory: core
        run: |
          MIHOMO_TAG="${{ needs.resolve-mihomo.outputs.tag }}"
          MIHOMO_VER="${{ needs.resolve-mihomo.outputs.version }}"
          echo "Updating mihomo to $MIHOMO_TAG"
          go get "github.com/metacubex/mihomo@$MIHOMO_TAG"
          go mod tidy
          echo "=== go.mod after update ==="
          grep metacubex/mihomo go.mod

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Cache Flutter packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: flutter-${{ hashFiles('pubspec.lock') }}
          restore-keys: flutter-

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Android APKs
        run: dart setup.dart android
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Collect APKs
        run: |
          mkdir -p dist
          find build/app/outputs/flutter-apk -name "*.apk" ! -name "*unsigned*" | while read f; do
            ARCH=$(echo "$f" | grep -oE 'arm64-v8a|armeabi-v7a|x86_64' || echo "universal")
            MIHOMO="${{ needs.resolve-mihomo.outputs.tag }}"
            CHANNEL="${{ github.event.inputs.mihomo_channel || 'stable' }}"
            cp "$f" "dist/FlClash-mihomo-${MIHOMO}-${CHANNEL}-android-${ARCH}.apk"
          done
          ls -lh dist/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks-mihomo-${{ needs.resolve-mihomo.outputs.tag }}
          path: dist/*.apk
          retention-days: 30

      - name: Create Release
        if: |
          (github.event.inputs.create_release == 'true' || github.event_name == 'push') &&
          startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          body: |
            ## FlClash (custom build)

            **Mihomo core:** ${{ needs.resolve-mihomo.outputs.tag }} (${{ github.event.inputs.mihomo_channel || 'stable' }})

            Built automatically by GitHub Actions.
          prerelease: ${{ github.event.inputs.mihomo_channel == 'alpha' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    if: github.event.inputs.build_platforms == 'all'
    needs: resolve-mihomo
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: core/go.sum

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev libblkid-dev liblzma-dev ninja-build \
            libayatana-appindicator3-dev libkeybinder-3.0-dev \
            rpm patchelf

      - name: Update Mihomo core to ${{ needs.resolve-mihomo.outputs.tag }}
        working-directory: core
        run: |
          go get "github.com/metacubex/mihomo@${{ needs.resolve-mihomo.outputs.tag }}"
          go mod tidy

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Desktop
        run: dart setup.dart

      - name: Upload Desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build-mihomo-${{ needs.resolve-mihomo.outputs.tag }}
          path: |
            build/**/*.exe
            build/**/*.AppImage
            build/**/*.deb
            build/**/*.rpm
          retention-days: 30
